# ========================================
# SubForge Docker Compose
# ========================================
# 端口配置：
#   前端 (nginx)  → FRONTEND_PORT (默认 3001)
#   后端 (python) → BACKEND_PORT (默认 3002)
#   数据库 (pg)   → DB_PORT (默认 45000)
#   域名代理      → 80/443 (仅域名访问时启用)
#
# 访问方式：
#   IP 访问:   http://YOUR_IP:FRONTEND_PORT
#   域名访问:  https://YOUR_DOMAIN (配置 SSL 后)
# ========================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: subforge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-subforge}
      POSTGRES_USER: ${DB_USER:-subforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-subforge123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-subforge}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - subforge

  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        COMMIT: ${COMMIT:-unknown}
    container_name: subforge-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3002}:3002"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subforge}
      DB_USER: ${DB_USER:-subforge}
      DB_PASSWORD: ${DB_PASSWORD:-subforge123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      BACKEND_PORT: ${BACKEND_PORT:-3002}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.get('http://localhost:3002/api/health'); exit(0 if r.status_code==200 else 1)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - subforge

  nginx:
    image: subforge-frontend:latest
    container_name: subforge-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-3002}
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - subforge

  # 域名代理 (仅配置域名时启用)
  # 使用: docker compose --profile proxy up -d
  proxy:
    image: nginx:alpine
    container_name: subforge-proxy
    restart: unless-stopped
    profiles:
      - proxy
    ports:
      - "${SSL_PORT:-3003}:443"
    environment:
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    entrypoint: ["/bin/sh", "-c", "envsubst '$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"]
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - subforge

volumes:
  pgdata:

networks:
  subforge:
    driver: bridge
