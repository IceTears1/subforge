services:
  postgres:
    image: postgres:15-alpine
    container_name: subforge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-subforge}
      POSTGRES_USER: ${DB_USER:-subforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-subforge123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-subforge}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - subforge

  backend:
    image: ${BACKEND_IMAGE:-}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: subforge-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subforge}
      DB_USER: ${DB_USER:-subforge}
      DB_PASSWORD: ${DB_PASSWORD:-subforge123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - subforge

  frontend:
    image: ${FRONTEND_IMAGE:-}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: subforge-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - subforge

  nginx:
    image: nginx:alpine
    container_name: subforge-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - subforge

volumes:
  pgdata:

networks:
  subforge:
    driver: bridge
